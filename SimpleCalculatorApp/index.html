<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Index - Simple Calculator</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="container py-5">
    <h1 class="text-center page-title">Index - Simple Calculator</h1>
    <p class="text-center"></p>

    <div class="row justify-content-center">
      <div class="col-md-6 col-sm-10">
        <div class="card calc-card">
          <div class="card-body p-4">

            <div class="mb-3">
              <label for="num1" class="form-label">First Number</label>
              <input type="number" id="num1" class="form-control" placeholder="Enter first integer"/>
            </div>

            <div class="mb-4">
              <label for="num2" class="form-label">Second Number</label>
              <input type="number" id="num2" class="form-control" placeholder="Enter second integer"/>
            </div>

            <div class="row g-3 mb-4">
              <div class="col-6">
                <button class="btn btn-success w-100 calc-btn" onclick="calculate('add')">
                  <i class="bi bi-plus-circle me-1"></i> Add
                </button>
              </div>
              <div class="col-6">
                <button class="btn btn-primary w-100 calc-btn" onclick="calculate('subtract')">
                  <i class="bi bi-dash-circle me-1"></i> Subtract
                </button>
              </div>
              <div class="col-6">
                <button class="btn btn-warning w-100 calc-btn text-white" onclick="calculate('multiply')">
                  <i class="bi bi-x-circle me-1"></i> Multiply
                </button>
              </div>
              <div class="col-6">
                <button class="btn btn-danger w-100 calc-btn" onclick="calculate('divide')">
                  <i class="bi bi-slash-circle me-1"></i> Division
                </button>
              </div>
            </div>

            <div id="result-section" class="result-box d-none">
              <p class="mb-1 result-label">Calculated Result</p>
              <p id="result-text" class="result-value mb-0"></p>
            </div>

          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
